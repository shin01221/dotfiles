# Messages
set -g message-style "fg=#f1dedc,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb4a9,bg=default"
set-option -g pane-active-border-style "fg=#dec38c,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#f1dedc"
set-option -g status-bg default
set-option -g status-style "fg=#f1dedc,bg=default"

# Selection mode
set-option -g mode-style "fg=#1a1110,bg=#ffb4a9"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#904a41]#[fg=#1a1110,bg=#904a41] #[fg=#f1dedc,bg=default] #W #[fg=#904a41]#[fg=#1a1110,bg=#904a41] #[fg=#f1dedc,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#f1dedc,bg=default] #W #[fg=#1a1110,bg=#ffb4a9] 󰈸#[fg=#ffb4a9,bg=default]"
set -g window-status-format "#[fg=#f1dedc,bg=default] #W #[fg=#1a1110,bg=#904a41] #I#[fg=#904a41,bg=default]"
