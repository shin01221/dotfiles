# Messages
set -g message-style "fg=#f1dfdb,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb4a4,bg=default"
set-option -g pane-active-border-style "fg=#dbc48c,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#f1dfdb"
set-option -g status-bg default
set-option -g status-style "fg=#f1dfdb,bg=default"

# Selection mode
set-option -g mode-style "fg=#1a110f,bg=#ffb4a4"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#904b3c]#[fg=#1a110f,bg=#904b3c] #[fg=#f1dfdb,bg=default] #W #[fg=#904b3c]#[fg=#1a110f,bg=#904b3c] #[fg=#f1dfdb,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#f1dfdb,bg=default] #W #[fg=#1a110f,bg=#ffb4a4] 󰈸#[fg=#ffb4a4,bg=default]"
set -g window-status-format "#[fg=#f1dfdb,bg=default] #W #[fg=#1a110f,bg=#904b3c] #I#[fg=#904b3c,bg=default]"
