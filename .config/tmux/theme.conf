# Messages
set -g message-style "fg=#ede0dc,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb59c,bg=default"
set-option -g pane-active-border-style "fg=#d6c68d,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#ede0dc"
set-option -g status-bg default
set-option -g status-style "fg=#ede0dc,bg=default"

# Selection mode
set-option -g mode-style "fg=#181210,bg=#ffb59c"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#9b4425]#[fg=#181210,bg=#9b4425] #[fg=#ede0dc,bg=default] #W #[fg=#9b4425]#[fg=#181210,bg=#9b4425] #[fg=#ede0dc,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#ede0dc,bg=default] #W #[fg=#181210,bg=#ffb59c] 󰈸#[fg=#ffb59c,bg=default]"
set -g window-status-format "#[fg=#ede0dc,bg=default] #W #[fg=#181210,bg=#9b4425] #I#[fg=#9b4425,bg=default]"
