# Messages
set -g message-style "fg=#e6e1e9,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#cbbeff,bg=default"
set-option -g pane-active-border-style "fg=#eeb8cb,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#e6e1e9"
set-option -g status-bg default
set-option -g status-style "fg=#e6e1e9,bg=default"

# Selection mode
set-option -g mode-style "fg=#141318,bg=#cbbeff"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#615690]#[fg=#141318,bg=#615690] #[fg=#e6e1e9,bg=default] #W #[fg=#615690]#[fg=#141318,bg=#615690] #[fg=#e6e1e9,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#e6e1e9,bg=default] #W #[fg=#141318,bg=#cbbeff] 󰈸#[fg=#cbbeff,bg=default]"
set -g window-status-format "#[fg=#e6e1e9,bg=default] #W #[fg=#141318,bg=#615690] #I#[fg=#615690,bg=default]"
