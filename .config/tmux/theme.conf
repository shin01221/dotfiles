# Messages
set -g message-style "fg=#fddbd6,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb4aa,bg=default"
set-option -g pane-active-border-style "fg=#ffb95d,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#fddbd6"
set-option -g status-bg default
set-option -g status-style "fg=#fddbd6,bg=default"

# Selection mode
set-option -g mode-style "fg=#200f0d,bg=#ffb4aa"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#c0000b]#[fg=#200f0d,bg=#c0000b] #[fg=#fddbd6,bg=default] #W #[fg=#c0000b]#[fg=#200f0d,bg=#c0000b] #[fg=#fddbd6,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#fddbd6,bg=default] #W #[fg=#200f0d,bg=#ffb4aa] 󰈸#[fg=#ffb4aa,bg=default]"
set -g window-status-format "#[fg=#fddbd6,bg=default] #W #[fg=#200f0d,bg=#c0000b] #I#[fg=#c0000b,bg=default]"
