# Messages
set -g message-style "fg=#f0dede,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb3b4,bg=default"
set-option -g pane-active-border-style "fg=#e6c18d,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#f0dede"
set-option -g status-bg default
set-option -g status-style "fg=#f0dede,bg=default"

# Selection mode
set-option -g mode-style "fg=#1a1111,bg=#ffb3b4"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#8f4a4d]#[fg=#1a1111,bg=#8f4a4d] #[fg=#f0dede,bg=default] #W #[fg=#8f4a4d]#[fg=#1a1111,bg=#8f4a4d] #[fg=#f0dede,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#f0dede,bg=default] #W #[fg=#1a1111,bg=#ffb3b4] 󰈸#[fg=#ffb3b4,bg=default]"
set -g window-status-format "#[fg=#f0dede,bg=default] #W #[fg=#1a1111,bg=#8f4a4d] #I#[fg=#8f4a4d,bg=default]"
