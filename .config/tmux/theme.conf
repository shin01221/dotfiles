# Messages
set -g message-style "fg=#ece0df,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb3b2,bg=default"
set-option -g pane-active-border-style "fg=#e4c18d,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#ece0df"
set-option -g status-bg default
set-option -g status-style "fg=#ece0df,bg=default"

# Selection mode
set-option -g mode-style "fg=#181212,bg=#ffb3b2"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#9c4144]#[fg=#181212,bg=#9c4144] #[fg=#ece0df,bg=default] #W #[fg=#9c4144]#[fg=#181212,bg=#9c4144] #[fg=#ece0df,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#ece0df,bg=default] #W #[fg=#181212,bg=#ffb3b2] 󰈸#[fg=#ffb3b2,bg=default]"
set -g window-status-format "#[fg=#ece0df,bg=default] #W #[fg=#181212,bg=#9c4144] #I#[fg=#9c4144,bg=default]"
