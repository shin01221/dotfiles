# Messages
set -g message-style "fg=#e4e1e6,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#bcc2ff,bg=default"
set-option -g pane-active-border-style "fg=#e6bad6,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#e4e1e6"
set-option -g status-bg default
set-option -g status-style "fg=#e4e1e6,bg=default"

# Selection mode
set-option -g mode-style "fg=#131316,bg=#bcc2ff"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#4c57a9]#[fg=#131316,bg=#4c57a9] #[fg=#e4e1e6,bg=default] #W #[fg=#4c57a9]#[fg=#131316,bg=#4c57a9] #[fg=#e4e1e6,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#e4e1e6,bg=default] #W #[fg=#131316,bg=#bcc2ff] 󰈸#[fg=#bcc2ff,bg=default]"
set -g window-status-format "#[fg=#e4e1e6,bg=default] #W #[fg=#131316,bg=#4c57a9] #I#[fg=#4c57a9,bg=default]"
