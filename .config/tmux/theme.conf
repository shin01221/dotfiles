# Messages
set -g message-style "fg=#bfb3db,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#9b8bc1,bg=default"
set-option -g pane-active-border-style "fg=#5d507c,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#bfb3db"
set-option -g status-bg default
set-option -g status-style "fg=#bfb3db,bg=default"

# Selection mode
set-option -g mode-style "fg=#15131b,bg=#9b8bc1"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#513399]#[fg=#15131b,bg=#513399] #[fg=#bfb3db,bg=default] #W #[fg=#513399]#[fg=#15131b,bg=#513399] #[fg=#bfb3db,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#bfb3db,bg=default] #W #[fg=#15131b,bg=#9b8bc1] 󰈸#[fg=#9b8bc1,bg=default]"
set -g window-status-format "#[fg=#bfb3db,bg=default] #W #[fg=#15131b,bg=#513399] #I#[fg=#513399,bg=default]"
