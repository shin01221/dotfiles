# Messages
set -g message-style "fg=#dcd7ba,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#c4b28a,bg=default"
set-option -g pane-active-border-style "fg=#938aa9,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#dcd7ba"
set-option -g status-bg default
set-option -g status-style "fg=#dcd7ba,bg=default"

# Selection mode
set-option -g mode-style "fg=#1f1f28,bg=#c4b28a"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#997933]#[fg=#1f1f28,bg=#997933] #[fg=#dcd7ba,bg=default] #W #[fg=#997933]#[fg=#1f1f28,bg=#997933] #[fg=#dcd7ba,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#dcd7ba,bg=default] #W #[fg=#1f1f28,bg=#c4b28a] 󰈸#[fg=#c4b28a,bg=default]"
set -g window-status-format "#[fg=#dcd7ba,bg=default] #W #[fg=#1f1f28,bg=#997933] #I#[fg=#997933,bg=default]"
