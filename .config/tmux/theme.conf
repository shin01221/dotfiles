# Messages
set -g message-style "fg=#ede0de,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#ffb3af,bg=default"
set-option -g pane-active-border-style "fg=#e2c28c,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#ede0de"
set-option -g status-bg default
set-option -g status-style "fg=#ede0de,bg=default"

# Selection mode
set-option -g mode-style "fg=#181212,bg=#ffb3af"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#9c4140]#[fg=#181212,bg=#9c4140] #[fg=#ede0de,bg=default] #W #[fg=#9c4140]#[fg=#181212,bg=#9c4140] #[fg=#ede0de,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#ede0de,bg=default] #W #[fg=#181212,bg=#ffb3af] 󰈸#[fg=#ffb3af,bg=default]"
set -g window-status-format "#[fg=#ede0de,bg=default] #W #[fg=#181212,bg=#9c4140] #I#[fg=#9c4140,bg=default]"
