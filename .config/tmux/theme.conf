# Messages
set -g message-style "fg=#231917,bg=default,bold"

# Pane borders
set-option -g pane-border-style "fg=#904b3a,bg=default"
set-option -g pane-active-border-style "fg=#6d5d2e,bg=default"

# Status bar colors (transparent background)
set-option -g status-fg "#231917"
set-option -g status-bg default
set-option -g status-style "fg=#231917,bg=default"

# Selection mode
set-option -g mode-style "fg=#fff8f6,bg=#904b3a"

# Formatting
set-option -g status-left-style none
set -g status-left-length 60
set -g status-left ''

set-option -g status-right-style none
set -g status-right-length 120
set -g status-right "#[fg=#ffb4a2]#[fg=#fff8f6,bg=#ffb4a2] #[fg=#231917,bg=default] #W #[fg=#ffb4a2]#[fg=#fff8f6,bg=#ffb4a2] #[fg=#231917,bg=default] #S "

set -g window-status-separator "#[bg=default] "
set -g window-status-current-format "#[fg=#231917,bg=default] #W #[fg=#fff8f6,bg=#904b3a] 󰈸#[fg=#904b3a,bg=default]"
set -g window-status-format "#[fg=#231917,bg=default] #W #[fg=#fff8f6,bg=#ffb4a2] #I#[fg=#ffb4a2,bg=default]"
